            aria-expanded="false"
            aria-label="Toggle navigation"

              <li class="nav-item">
                <a

              </li>
              <li class="nav-item">
                <a class="nav-link" href="./About.html">About</a>

              <li class="nav-item">

              </li>
              <li class="nav-item">
                <a class="nav-link" href="./contact.html">contact</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>

      <!-- navbar -->

      <!-- about page content -->
      <div class="row">
        <div class="col-6">
          <form>
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label"
                >Email address</label
              >
              <input
                type="email"
                class="form-control"
                id="exampleInputEmail1"
                aria-describedby="emailHelp"
              />
              <div id="emailHelp" class="form-text">
                We'll never share your email with anyone else.
              </div>
            </div>
            <div class="mb-3">
              <label for="exampleInputPassword1" class="form-label"
                >Password</label
              >
              <input
                type="password"
                class="form-control"
                id="exampleInputPassword1"
              />
            </div>
            <div class="mb-3 form-check">
              <input
                type="checkbox"
                class="form-check-input"
                id="exampleCheck1"
              />
              <label class="form-check-label" for="exampleCheck1"
                >Check me out</label
              >
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
          </form>
        </div>
        <div class="col-6">
          <div>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3915.83202414723!2d75.98781647363921!3d11.051217554067845!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba64ddbec4f6b0f%3A0xd3b196235640ccde!2sUpcode%20Software%20Labs%20-%20Malappuram&#39;s%20Best%20AI%20Software%20Development%20Training%20Institute!5e0!3m2!1sen!2sin!4v1776833381525!5m2!1sen!2sin"
              width="600"
              height="450"
              style="border: 0"

              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
        </div>

        <div class="card-header">Featured</div>

          <a href="#" class="btn btn-primary">Go somewhere</a>

        <div class="card-footer text-body-secondary">2 days ago</div>
      </div>
